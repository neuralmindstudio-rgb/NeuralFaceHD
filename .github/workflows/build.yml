[app]
# (Seção Principal)
title = Neural Face HD
package.name = neuralfacehd
package.domain = br.com.neuralmindstudio
source.dir = .
source.include_exts = py,png,jpg,kv,atlas,json,onnx,keystore
version = 1.0.0

# (Requisitos de Hardware e Permissões)
android.permissions = INTERNET, WRITE_EXTERNAL_STORAGE, READ_EXTERNAL_STORAGE, CAMERA
android.api = 33
android.minapi = 21
android.sdk = 33
android.ndk = 25b
android.archs = arm64-v8a, armeabi-v7a

# (Arquivos de IA e Assets)
# Certifique-se de que a pasta gfpgan e o arquivo onnx estão incluídos
source.include_patterns = assets/*, gfpgan/*, *.onnx

# (Configuração de Assinatura - Play Store)
# IMPORTANTE: Substitua 'SUA_SENHA_AQUI' pela senha que você criou para a keystore
android.keystore = neuralface.keystore
android.keystore_password = SUA_SENHA_AQUI
android.keyalias = neuralface
android.keyalias_password = SUA_SENHA_AQUI

# (Ícones e Splash)
icon.filename = logo.png
presplash.filename = splash.png

# (Configurações do Python/Kivy)
requirements = python3,kivy==2.2.1,kivymd==1.1.1,pillow,requests,opencv-python,numpy,onnxruntime,insightface

# (Buildozer Options)
log_level = 2
warn_on_root = 0
