name: Build Android App (Debug APK)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # 1. Pega o código
      - uses: actions/checkout@v4

      # 2. Instalar dependências do sistema
      - name: Instalar Dependências
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git python3-dev \
          ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
          libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev \
          libgstreamer1.0-dev openjdk-17-jdk ant autoconf automake libtool pkg-config \
          libunwind-dev libcrypt1 expect wget unzip

      # 3. Configurar Python
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 4. Instalar Buildozer e Cython
      - name: Instalar Buildozer e Cython
        run: |
          pip install --upgrade pip
          pip install cython==0.29.33 buildozer==1.5.0

      # 5. Gerar APK Debug
      - name: Gerar APK Debug
        run: |
          export ACLOCAL_PATH=/usr/share/aclocal
          mkdir -p ~/.android && touch ~/.android/repositories.cfg
          (while true; do echo y; sleep 10; done) | buildozer android debug
        shell: bash

      # 6. Upload do APK Debug
      - name: Upload do APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: NeuralFaceHD_Debug_APK
          path: bin/*.apk
