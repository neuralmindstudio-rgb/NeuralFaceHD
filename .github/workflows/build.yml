name: Build APK Oficial Assinado

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev python3-dev
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 setuptools appdirs packaging colorama jinja2 six toml sh build wheel

      - name: Build, Sign and Optimize
        run: |
          # 1. CRIAR A CHAVE OFICIAL
          keytool -genkey -noprompt \
            -keystore neuralface_oficial.keystore \
            -alias neural_oficial \
            -storepass neural2026 \
            -keypass neural2026 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Anderson, OU=Neural, O=Neural, L=Lages, S=SC, C=BR"
          
          # 2. GERAR O APK COM BUILDOZER (Mesmo que saia unsigned)
          yes | buildozer -v android release
          
          # 3. LOCALIZAR O ARQUIVO GERADO
          APK_UNSIGNED=$(ls bin/*unsigned.apk | head -n 1)
          echo "Arquivo encontrado: $APK_UNSIGNED"

          # 4. ZIPALIGN (Otimização obrigatória para evitar 'Erro de Pacote')
          # O caminho do build-tools pode variar, por isso usamos o comando direto
          /usr/local/lib/android/sdk/build-tools/34.0.0/zipalign -v 4 $APK_UNSIGNED bin/NeuralFace_Alinhado.apk

          # 5. APKSIGNER (Assinatura Oficial V2/V3)
          /usr/local/lib/android/sdk/build-tools/34.0.0/apksigner sign --ks neuralface_oficial.keystore \
            --ks-pass pass:neural2026 \
            --ks-key-alias neural_oficial \
            --key-pass pass:neural2026 \
            --out bin/NeuralFaceHD_FINAL_INSTALAVEL.apk \
            bin/NeuralFace_Alinhado.apk

          # 6. ORGANIZAÇÃO
          cp neuralface_oficial.keystore bin/
          # Remove arquivos temporários para não confundir
          rm bin/NeuralFace_Alinhado.apk
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NeuralFaceHD-PROJETO-FINAL
          path: bin/
      
