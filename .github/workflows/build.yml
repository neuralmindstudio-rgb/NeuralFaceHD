name: Build Android App (Debug APK)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Limpar Espaço e Instalar Dependencias
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            python3-pip build-essential git python3 python3-dev \
            ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev \
            libgstreamer1.0-dev openjdk-17-jdk ant autoconf automake libtool pkg-config \
            libunwind-dev libcrypt1 expect curl unzip
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Buildozer e Cython
        run: |
          pip install --upgrade pip
          pip install cython==0.29.33 buildozer==1.5.0

      - name: Configurar Android SDK/NDK
        run: |
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          mkdir -p $ANDROID_SDK_ROOT
          # Instala NDK 25b específico
          curl -o ndk.zip https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
          unzip ndk.zip -d $ANDROID_SDK_ROOT
          rm ndk.zip
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/android-ndk-r25b
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_NDK_HOME:$PATH
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Gerar APK Debug
        run: |
          export ACLOCAL_PATH=/usr/share/aclocal
          mkdir -p ~/.android && touch ~/.android/repositories.cfg
          buildozer android debug
        env:
          APP_ANDROID_KEYSTORE: release.keystore
          APP_ANDROID_KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          APP_ANDROID_KEYALIAS: ${{ secrets.KEY_ALIAS }}
          APP_ANDROID_KEYALIAS_PASS: ${{ secrets.KEY_ALIAS_PASSWORD }}

      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: NeuralFaceHD_APK_Debug
          path: bin/*.apk
