name: Build AAB Oficial Play Store

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev python3-dev
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 setuptools appdirs packaging colorama jinja2 six toml sh build wheel

      - name: Build and Sign AAB
        run: |
          # 1. CRIAR A CHAVE (Caso ela não exista no runner)
          keytool -genkey -noprompt \
            -keystore neuralface_oficial.keystore \
            -alias neural_oficial \
            -storepass neural2026 \
            -keypass neural2026 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Anderson, OU=Neural, O=Neural, L=Lages, S=SC, C=BR"

          # 2. GERAR O AAB VIA BUILDOZER
          # Forçamos as variáveis de ambiente para o buildozer tentar assinar sozinho primeiro
          APP_ANDROID_KEYSTORE=neuralface_oficial.keystore \
          APP_ANDROID_KEYALIAS=neural_oficial \
          APP_ANDROID_KEYSTORE_PASSWORD=neural2026 \
          APP_ANDROID_KEYALIAS_PASSWORD=neural2026 \
          yes | buildozer -v android release

          # 3. LOCALIZAR O AAB GERADO (Geralmente na pasta bin)
          AAB_UNSIGNED=$(ls bin/*.aab | head -n 1)
          echo "Arquivo encontrado: $AAB_UNSIGNED"

          # 4. ZIPALIGN (Otimização obrigatória)
          /usr/local/lib/android/sdk/build-tools/34.0.0/zipalign -v 4 $AAB_UNSIGNED bin/NeuralFace_Alinhado.aab

          # 5. APKSIGNER (Assinatura Oficial V2/V3 no AAB)
          /usr/local/lib/android/sdk/build-tools/34.0.0/apksigner sign --ks neuralface_oficial.keystore \
            --ks-pass pass:neural2026 \
            --ks-key-alias neural_oficial \
            --key-pass pass:neural2026 \
            --out bin/NeuralFaceHD_FINAL_PLAYSTORE.aab \
            bin/NeuralFace_Alinhado.aab

          # 6. LIMPEZA E CÓPIA DA CHAVE
          cp neuralface_oficial.keystore bin/
          rm bin/NeuralFace_Alinhado.aab
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NeuralFaceHD-AAB-PLAYSTORE
          path: bin/
      
