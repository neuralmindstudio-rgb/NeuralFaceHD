name: Build APK Oficial Assinado

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev python3-dev
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 setuptools appdirs packaging colorama jinja2 six toml sh build wheel

      - name: Build with Buildozer
        run: |
          # 1. CRIAR A NOVA CHAVE OFICIAL
          keytool -genkey -noprompt \
            -keystore neuralface_oficial.keystore \
            -alias neural_oficial \
            -storepass neural2026 \
            -keypass neural2026 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Anderson, OU=Neural, O=Neural, L=Lages, S=SC, C=BR"
          
          # 2. MOVER A CHAVE PARA A PASTA BIN (PARA VOCÊ PODER BAIXAR E GUARDAR)
          mkdir -p bin
          cp neuralface_oficial.keystore bin/
          
          # 3. GERAR O APK ASSINADO
          yes | buildozer -v android release
        env:
          APP_ANDROID_KEYSTORE: neuralface_oficial.keystore
          APP_ANDROID_KEYALIAS: neural_oficial
          APP_ANDROID_KEYSTORE_PASSWORD: neural2026
          APP_ANDROID_KEYALIAS_PASSWORD: neural2026
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NeuralFaceHD-PROJETO-FINAL
          path: bin/
      
