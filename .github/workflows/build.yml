name: Build Android App (Debug APK)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ANDROIDSDK: /usr/local/lib/android/sdk
      ANDROIDNDK: /usr/local/lib/android/sdk/ndk/25b
      ANDROIDAPI: 33
      ANDROIDMINAPI: 21
      JAVA_HOME: /usr/lib/jvm/temurin-11-jdk-amd64
      PATH: ${{ env.PATH }}:/usr/local/lib/android/sdk/tools:/usr/local/lib/android/sdk/platform-tools

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git wget unzip openjdk-11-jdk python3-pip python3-venv build-essential zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev
          pip install --upgrade pip buildozer cython==0.29.36

      - name: Set up Android NDK and SDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r25b-linux.zip -O ndk.zip
          unzip -q ndk.zip -d $ANDROIDSDK/ndk/
          rm ndk.zip
          echo "NDK installed to $ANDROIDNDK"

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: bin/*.apk
