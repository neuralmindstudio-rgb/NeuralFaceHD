name: Build NeuralFaceHD
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev libbz2-dev libsqlite3-dev
          pip3 install --user --upgrade Cython==0.29.33 buildozer

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Aceita as licenças de forma silenciosa e limpa erros antigos
          buildozer android clean
          buildozer android debug
        env:
          # Esta variável substitui a necessidade do comando 'yes'
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          # Força o Buildozer a usar o Java que instalamos
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NeuralFaceHD-Final
          path: bin/*.apk
