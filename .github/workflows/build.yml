name: Build NeuralFaceHD
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer
        # Corrigido: Nome correto do repositório da ação
        uses: ArtemSerebrennkov/buildozer-action@v1.6.1
        with:
          buildozer_version: master
          python_version: "3.10"

      - name: Upload APK
        # Atualizado: v4 é a versão obrigatória agora
        uses: actions/upload-artifact@v4
        with:
          name: NeuralFaceHD-Final
          path: bin/*.apk
