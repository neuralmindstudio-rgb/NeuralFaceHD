name: Build Android App (Auto-Key)
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Dependencias
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git python3 python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev openjdk-17-jdk

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Buildozer e Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Criar Nova Keystore (Automático)
        run: |
          # Aqui o robô cria a chave sozinho com as senhas dos seus Secrets
          keytool -genkey -v -keystore release.keystore -alias ${{ secrets.KEY_ALIAS }} -keyalg RSA -keysize 2048 -validity 10000 -storepass ${{ secrets.KEYSTORE_PASSWORD }} -keypass ${{ secrets.KEY_ALIAS_PASSWORD }} -dname "CN=Anderson, OU=NeuralMind, O=Studio, L=Lages, S=SC, C=BR"

      - name: Gerar App Bundle (AAB)
        run: |
          export APP_ANDROID_KEYSTORE=release.keystore
          export APP_ANDROID_KEYSTORE_PASS=${{ secrets.KEYSTORE_PASSWORD }}
          export APP_ANDROID_KEYALIAS=${{ secrets.KEY_ALIAS }}
          export APP_ANDROID_KEYALIAS_PASS=${{ secrets.KEY_ALIAS_PASSWORD }}
          # O buildozer vai usar a chave que o robô acabou de criar
          buildozer android release

      - name: Upload do App e da Nova Chave
        uses: actions/upload-artifact@v4
        with:
          name: NeuralFaceHD_Final_e_Chave
          path: |
            bin/*.aab
            release.keystore
