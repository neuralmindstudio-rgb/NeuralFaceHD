name: Build NeuralFaceHD
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04 # Versão mais estável para Android SDK
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK & AIDL
        run: |
          sudo apt update
          # Instala as ferramentas que contêm o AIDL diretamente no sistema
          sudo apt install -y adb hercules-aidl aidl build-essential git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev libbz2-dev libsqlite3-dev
          pip3 install --user --upgrade Cython==0.29.33 buildozer

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Aceita as licenças antes de começar
          yes | buildozer android debug || true
          buildozer android debug
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          # Força o Buildozer a usar o AIDL do sistema se o dele falhar
          PATH: /usr/bin:/usr/local/bin:/home/runner/.local/bin:/usr/sbin:/usr/bin:/sbin:/bin
