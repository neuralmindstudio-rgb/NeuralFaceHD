name: Build APK Oficial

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: System Tuning
        run: |
          sudo prlimit --pid $$ --nofile=1048576:1048576

      - name: Cache Buildozer
        uses: actions/cache@v3
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

      # DEPENDÊNCIAS: Kit ultra completo para não parar em nenhum ModuleNotFound
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libunwind-dev build-essential libffi-dev python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev
          sudo apt-get install -y libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly autoconf automake libtool pkg-config cmake
          pip install --upgrade pip
          # 🔥 ADICIONADO 'build' e 'wheel' para sanar o erro de agora
          pip install buildozer cython==0.29.33 setuptools appdirs packaging colorama jinja2 six toml sh build wheel

      - name: Build with Buildozer
        run: |
          buildozer android clean
          yes | buildozer -v android release
        env:
          APP_ANDROID_KEYSTORE: neuralface.keystore

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NeuralFaceHD-Arquivos-Finais
          path: bin/
