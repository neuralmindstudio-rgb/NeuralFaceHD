name: Build Android App
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Dependencias do Sistema
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git python3 python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-libav gstreamer1.0-tools gstreamer1.0-x gstreamer1.0-alsa gstreamer1.0-gl gstreamer1.0-gtk3 gstreamer1.0-pulseaudio libsqlite3-dev sqlite3 bzip2 libbz2-dev libssl-dev openssl libgdbm-dev libgdbm-compat-dev liblzma-dev libreadline-dev uuid-dev libffi-dev tk-dev openjdk-17-jdk

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Buildozer e Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Aceitar Licencas Android (Resolve Erro 100)
        run: |
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=/usr/local/lib/android/sdk --licenses || true

      - name: Restaurar Keystore (Com Limpeza de Espaços)
        run: |
          # O comando 'tr -d' remove quebras de linha e espaços que o Windows costuma colocar
          echo "${{ secrets.KEYSTORE_B64 }}" | tr -d '\r\n ' | base64 -d > release.keystore

      - name: Gerar App Bundle (AAB) Assinado
        run: |
          export APP_ANDROID_KEYSTORE=release.keystore
          export APP_ANDROID_KEYSTORE_PASS=${{ secrets.KEYSTORE_PASSWORD }}
          export APP_ANDROID_KEYALIAS=${{ secrets.KEY_ALIAS }}
          export APP_ANDROID_KEYALIAS_PASS=${{ secrets.KEY_ALIAS_PASSWORD }}
          buildozer android release

      - name: Upload do AAB Pronto
        uses: actions/upload-artifact@v4
        with:
          name: NeuralFaceHD-Release
          path: bin/*.aab
