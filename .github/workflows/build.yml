name: Build APK Oficial Assinado

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev python3-dev
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 setuptools appdirs packaging colorama jinja2 six toml sh build wheel

      - name: Build and Manual Sign
        run: |
          # 1. CRIAR A CHAVE OFICIAL
          keytool -genkey -noprompt \
            -keystore neuralface_oficial.keystore \
            -alias neural_oficial \
            -storepass neural2026 \
            -keypass neural2026 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Anderson, OU=Neural, O=Neural, L=Lages, S=SC, C=BR"
          
          # 2. GERAR O APK (Mesmo que saia unsigned, vamos resolver no passo 3)
          yes | buildozer -v android release
          
          # 3. ASSINATURA MANUAL (O XEQUE-MATE)
          # Localiza o arquivo gerado na pasta bin
          APK_FILE=$(ls bin/*unsigned.apk | head -n 1)
          echo "Assinando manualmente o arquivo: $APK_FILE"
          
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA256 \
            -keystore neuralface_oficial.keystore \
            -storepass neural2026 \
            -keypass neural2026 \
            $APK_FILE neural_oficial

          # 4. ORGANIZAÇÃO FINAL
          # Criamos um arquivo com nome claro para você não ter dúvida
          cp $APK_FILE bin/NeuralFaceHD_PRONTO_PARA_TESTE.apk
          cp neuralface_oficial.keystore bin/
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NeuralFaceHD-PROJETO-FINAL
          path: bin/
      
