name: Build NeuralFaceHD
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    # Usando o container oficial que já tem as ferramentas básicas
    container:
      image: kivy/buildozer:latest

    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer
        run: |
          # O comando 'yes' responde "y" para todas as perguntas de licença e NDK
          yes | buildozer android debug
        env:
          # Reforço para o Android aceitar as licenças silenciosamente
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          # Evita que o Python peça entrada de dados
          PYTHONUNBUFFERED: "1"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NeuralFaceHD-Final
          path: bin/*.apk
