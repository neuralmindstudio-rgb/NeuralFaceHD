name: Build NeuralFaceHD
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache Buildozer deps
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip3 install --user --upgrade Cython==0.29.33 buildozer

      - name: Prepare Android SDK Licenses
        run: |
          # Cria a pasta de licenças para evitar que o Buildozer pare o processo
          mkdir -p ~/.android && touch ~/.android/repositories.cfg
          export PATH=$PATH:$HOME/.local/bin

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Rodamos o build direto. O 'accept_sdk_license = True' no seu spec fará o restante.
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NeuralFaceHD-Final
          path: bin/*.apk
