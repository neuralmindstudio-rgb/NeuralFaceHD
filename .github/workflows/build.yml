name: Build NeuralFaceHD

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            libbz2-dev libsqlite3-dev

          pip3 install --user --upgrade pip
          pip3 install --user Cython==0.29.33 buildozer

      - name: Prepare clean environment
        run: |
          export PATH=$PATH:$HOME/.local/bin

          # 🔥 limpa corretamente (SEM usar buildozer clean)
          rm -rf .buildozer
          rm -rf bin

          # 🔧 evita erro interno do p4a
          mkdir -p .buildozer/android/platform

      - name: Build APK
        run: |
          export PATH=$PATH:$HOME/.local/bin
          buildozer -v android debug
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NeuralFaceHD-Final
          path: bin/*.apk
